[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Netlify's built-in Next.js Runtime handles SSR, static files, and routing
# automatically when base directory points to a Next.js project.
# No publish directory or plugin needed.

# Proxy API and uploads to backend (update URL when backend is deployed)
[[redirects]]
  from = "/api/v1/*"
  to = "https://your-backend-url.com/api/v1/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "https://your-backend-url.com/uploads/:splat"
  status = 200
