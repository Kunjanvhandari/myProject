[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api/v1/*"
  to = "https://your-backend-url.com/api/v1/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "https://your-backend-url.com/uploads/:splat"
  status = 200
