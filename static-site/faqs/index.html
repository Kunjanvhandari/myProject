<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQs - SaraswatiLibrary</title>
  <meta name="description" content="Frequently asked questions about SaraswatiLibrary. Find answers about membership, borrowing, account management, and library services.">
  <meta property="og:title" content="FAQs - SaraswatiLibrary">
  <meta property="og:description" content="Find answers to common questions about our library services.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SaraswatiLibrary">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../images/logo/book-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="faqs">

  <div id="navbar"></div>

  <!-- Hero Page Section -->
  <section class="hero-page">
    <div class="container" style="position: relative; z-index: 1;">
      <span class="section-chip" style="background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); margin-bottom: 16px;">
        <i class="fa fa-question-circle" style="margin-right: 4px;"></i> HELP CENTER
      </span>
      <h1 class="hero-page-title">Frequently Asked Questions</h1>
      <p class="hero-page-subtitle">Find answers to the most common questions about our library services, membership, and resources.</p>
    </div>
  </section>

  <!-- FAQ Accordion Section -->
  <section class="section">
    <div class="container" style="max-width: 800px;">
      <div id="faq-list"></div>
    </div>
  </section>

  <!-- Contact Support CTA -->
  <section class="section section-dark">
    <div class="container text-center">
      <div style="max-width: 600px; margin: 0 auto;">
        <div style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #0EA5E9, #8B5CF6); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 28px; color: white;">
          <i class="fa fa-headset"></i>
        </div>
        <h2 style="margin-bottom: 12px;">Still Have Questions?</h2>
        <p style="color: var(--text-secondary); font-size: 16px; margin-bottom: 28px; line-height: 1.7;">
          Our support team is here to help. Reach out to us and we will get back to you as soon as possible.
        </p>
        <div style="display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;">
          <a href="../contact-us/index.html" class="btn btn-secondary btn-lg btn-rounded">
            <i class="fa fa-envelope"></i> Contact Support
          </a>
           <a href="mailto:kunjanvhandari9@gmail.com" class="btn btn-accent-outlined btn-lg btn-rounded">
            <i class="fa fa-paper-plane"></i> Email Us
          </a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <div id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/users.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var faqList = document.getElementById('faq-list');
      if (faqList && typeof faqData !== 'undefined') {
        var html = '';
        faqData.forEach(function(faq) {
          html += '<div class="faq-item" id="faq-' + faq.id + '">' +
            '<button class="faq-question" onclick="document.getElementById(\'faq-' + faq.id + '\').classList.toggle(\'active\')">' +
              '<span>' + faq.question + '</span>' +
              '<i class="fa fa-chevron-down faq-toggle"></i>' +
            '</button>' +
            '<div class="faq-answer">' +
              '<p>' + faq.answer + '</p>' +
            '</div>' +
          '</div>';
        });
        faqList.innerHTML = html;
      }
    });
  </script>
</body>
</html>
