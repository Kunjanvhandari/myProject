<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Books - SaraswatiLibrary</title>
  <meta name="description" content="Browse textbooks and study materials for your class at SaraswatiLibrary. Download PDFs, read online, and explore subject-wise books for all classes.">
  <meta property="og:title" content="Class Books - SaraswatiLibrary">
  <meta property="og:description" content="Access textbooks and study materials organized by class and subject.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SaraswatiLibrary">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../../images/logo/book-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .class-hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 80px 0 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .class-hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      animation: heroFloat 20s linear infinite;
    }
    @keyframes heroFloat {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, 30px); }
    }
    .class-hero-content {
      position: relative;
      z-index: 2;
    }
    .class-hero-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      padding: 8px 20px;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s;
    }
    .class-hero-back:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .class-hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
    }
    .class-hero-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.75);
      max-width: 500px;
      margin: 0 auto 24px;
      line-height: 1.6;
    }
    .class-hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .class-hero-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }
    .class-hero-stat strong {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
    }
    .class-hero-stat i {
      font-size: 18px;
      opacity: 0.7;
    }
    .subject-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 0 4px;
    }
    .subject-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 50px;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .subject-tab:hover {
      border-color: #667eea;
      color: #667eea;
      transform: translateY(-1px);
    }
    .subject-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(102,126,234,0.35);
    }
    .subject-tab .tab-count {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 11px;
    }
    .subject-tab.active .tab-count {
      background: rgba(255,255,255,0.25);
    }
    .class-books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .class-book-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .class-book-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      border-color: transparent;
    }
    .class-book-cover {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf5 100%);
    }
    .class-book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .class-book-card:hover .class-book-cover img {
      transform: scale(1.05);
    }
    .class-book-subject-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fff;
      backdrop-filter: blur(8px);
      z-index: 2;
    }
    .badge-english { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .badge-nepali { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .badge-math { background: linear-gradient(135deg, #10b981, #059669); }
    .badge-science { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .badge-social-studies { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .badge-health { background: linear-gradient(135deg, #ec4899, #be185d); }
    .badge-physics { background: linear-gradient(135deg, #06b6d4, #0891b2); }
    .badge-chemistry { background: linear-gradient(135deg, #f97316, #ea580c); }
    .badge-biology { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .badge-geography { background: linear-gradient(135deg, #14b8a6, #0d9488); }
    .badge-economics { background: linear-gradient(135deg, #a855f7, #9333ea); }
    .badge-computer { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .badge-default { background: linear-gradient(135deg, #6b7280, #4b5563); }
    .class-book-rating-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      color: #fbbf24;
      z-index: 2;
    }
    .class-book-rating-overlay i {
      font-size: 10px;
    }
    .class-book-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .class-book-title {
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .class-book-author {
      font-size: 13px;
      color: var(--text-tertiary);
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .class-book-author i {
      font-size: 11px;
      opacity: 0.6;
    }
    .class-book-stars {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 14px;
    }
    .class-book-stars .star {
      color: #fbbf24;
      font-size: 13px;
    }
    .class-book-stars .star.empty {
      color: var(--border-color);
    }
    .class-book-stars .rating-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-left: 4px;
    }
    .class-book-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .class-book-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .class-book-btn i {
      font-size: 11px;
    }
    .btn-read {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .btn-read:hover {
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      transform: translateY(-1px);
      color: #fff;
    }
    .btn-download {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
    }
    .btn-download:hover {
      box-shadow: 0 4px 15px rgba(16,185,129,0.4);
      transform: translateY(-1px);
      color: #fff;
    }
    .btn-details {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    .btn-details:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .class-empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .class-empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .class-empty-icon i {
      font-size: 32px;
      color: var(--text-tertiary);
    }
    .class-empty-state h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 8px;
    }
    .class-empty-state p {
      color: var(--text-tertiary);
      font-size: 14px;
      max-width: 400px;
      margin: 0 auto;
    }
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
    }
    .results-count {
      font-size: 14px;
      color: var(--text-tertiary);
    }
    .results-count strong {
      color: var(--text-primary);
    }
    .book-detail-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .book-detail-modal-overlay.open {
      display: flex;
      opacity: 1;
    }
    .book-detail-modal {
      background: var(--bg-secondary);
      border-radius: 20px;
      max-width: 640px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .book-detail-modal-overlay.open .book-detail-modal {
      transform: translateY(0);
    }
    .book-detail-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
    }
    .book-detail-modal-header h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .book-detail-modal-header h3 i {
      color: #667eea;
    }
    .modal-close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close-btn:hover {
      background: #ef4444;
      color: #fff;
    }
    .book-detail-modal-body {
      padding: 24px;
    }
    .book-detail-top {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
    }
    .book-detail-cover {
      width: 160px;
      min-height: 200px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }
    .book-detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .book-detail-info {
      flex: 1;
    }
    .book-detail-info h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 6px;
      line-height: 1.3;
    }
    .book-detail-info .detail-author {
      font-size: 14px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }
    .book-detail-info .detail-author strong {
      color: var(--text-secondary);
    }
    .detail-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .detail-rating .stars {
      display: flex;
      gap: 2px;
    }
    .detail-rating .stars .star {
      color: #fbbf24;
      font-size: 14px;
    }
    .detail-rating .rating-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .detail-meta-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 50px;
      background: var(--bg-tertiary);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .detail-meta-tag i {
      font-size: 10px;
      opacity: 0.7;
    }
    .detail-stock {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
    }
    .detail-stock.in-stock {
      background: rgba(16,185,129,0.1);
      color: #10b981;
    }
    .detail-stock.low-stock {
      background: rgba(245,158,11,0.1);
      color: #f59e0b;
    }
    .detail-stock.out-of-stock {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
    }
    .detail-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 20px;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: 12px;
    }
    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-actions .class-book-btn {
      flex: none;
      padding: 11px 20px;
      font-size: 13px;
      border-radius: 12px;
    }
    @media (max-width: 768px) {
      .class-hero-title { font-size: 28px; }
      .class-hero-subtitle { font-size: 14px; }
      .class-hero-stats { gap: 16px; }
      .class-books-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
      .book-detail-top { flex-direction: column; align-items: center; text-align: center; }
      .book-detail-cover { width: 120px; min-height: 160px; }
      .detail-rating { justify-content: center; }
      .detail-meta { justify-content: center; }
      .detail-actions { justify-content: center; }
    }
    @media (max-width: 480px) {
      .class-hero { padding: 60px 0 40px; }
      .class-hero-title { font-size: 24px; }
      .subject-tabs { gap: 6px; }
      .subject-tab { padding: 8px 14px; font-size: 12px; }
      .class-books-grid { grid-template-columns: 1fr; }
      .class-book-actions { flex-direction: column; }
      .class-book-btn { justify-content: center; }
    }
  </style>
</head>
<body data-page="class">
  <div id="navbar"></div>

  <!-- Hero Section -->
  <section class="class-hero">
    <div class="class-hero-content container">
      <a href="../../library/index.html" class="class-hero-back">
        <i class="fas fa-arrow-left"></i> Back to Library
      </a>
      <h1 class="class-hero-title" id="class-hero-title">Class Books</h1>
      <p class="class-hero-subtitle" id="class-hero-subtitle">Browse all textbooks and study materials for your class</p>
      <div class="class-hero-stats">
        <div class="class-hero-stat">
          <i class="fas fa-book"></i>
          <strong id="stat-total">0</strong>
          <span>Books</span>
        </div>
        <div class="class-hero-stat">
          <i class="fas fa-layer-group"></i>
          <strong id="stat-subjects">0</strong>
          <span>Subjects</span>
        </div>
        <div class="class-hero-stat">
          <i class="fas fa-star"></i>
          <strong id="stat-avg-rating">0.0</strong>
          <span>Avg Rating</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Subject Filter + Books -->
  <section class="section">
    <div class="container">
      <!-- Subject Tabs -->
      <div style="margin-bottom: 24px;">
        <div class="subject-tabs" id="subject-tabs"></div>
      </div>

      <!-- Results Bar -->

        <div class="results-count" id="results-count"></div>
      </div>

      <!-- Books Grid -->

  <!-- Book Detail Modal -->
  <div class="book-detail-modal-overlay" id="book-modal">
    <div class="book-detail-modal">
      <div class="book-detail-modal-header">
        <h3><i class="fa fa-book"></i> Book Details</h3>
        <button class="modal-close-btn" onclick="closeBookModal()">&times;</button>
      </div>
      <div class="book-detail-modal-body" id="book-modal-body"></div>
    </div>
  </div>

  <div id="footer"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="../../js/data.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/users.js"></script>
  <script src="../../js/notifications.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var classNum = parseInt(params.get('class'), 10);

      if (!classNum || classNum < 1 || classNum > 12) {
        classNum = 10;
      }

      var categoryMap = {
        1: 'Class 1-5', 2: 'Class 1-5', 3: 'Class 1-5', 4: 'Class 1-5', 5: 'Class 1-5',
        6: 'Class 6-8', 7: 'Class 6-8', 8: 'Class 6-8',
        9: 'Class 9-10', 10: 'Class 9-10',
        11: 'Class 11-12', 12: 'Class 11-12'
      };

      var targetCategory = categoryMap[classNum];
      var allBooksData = typeof allBooks !== 'undefined' ? allBooks : [];
      var base = typeof getBasePath === 'function' ? getBasePath() : '../../';

      var classBooks = allBooksData.filter(function (b) {
        if (b.category !== targetCategory) return false;
        var titleLower = (b.title || '').toLowerCase();
        var classLabel = 'class ' + classNum;
        return titleLower.indexOf(classLabel) !== -1;
      });

      if (classBooks.length === 0) {
        classBooks = allBooksData.filter(function (b) {
          return b.category === targetCategory;
        });
      }

      var uniqueSubjects = [];
      var subjectCountMap = {};
      classBooks.forEach(function (b) {
        if (b.subject) {
          if (!subjectCountMap[b.subject]) {
            subjectCountMap[b.subject] = 0;
            uniqueSubjects.push(b.subject);
          }
          subjectCountMap[b.subject]++;
        }
      });
      uniqueSubjects.sort();

      var currentSubject = 'all';

      document.getElementById('class-hero-title').textContent = 'Class ' + classNum + ' Books';
      document.getElementById('class-hero-subtitle').textContent = 'Browse all textbooks and study materials for Class ' + classNum;
      document.getElementById('stat-total').textContent = classBooks.length;
      document.getElementById('stat-subjects').textContent = uniqueSubjects.length;

      var totalRating = 0;
      classBooks.forEach(function (b) { totalRating += (b.rating || 0); });
      var avgRating = classBooks.length > 0 ? (totalRating / classBooks.length).toFixed(1) : '0.0';
      document.getElementById('stat-avg-rating').textContent = avgRating;

      document.title = 'Class ' + classNum + ' Books - SaraswatiLibrary';

      function getSubjectBadgeClass(subject) {
        var s = (subject || '').toLowerCase().replace(/\s+/g, '-');
        var map = {
          'english': 'badge-english',
          'nepali': 'badge-nepali',
          'math': 'badge-math',
          'mathematics': 'badge-math',
          'science': 'badge-science',
          'social-studies': 'badge-social-studies',
          'health': 'badge-health',
          'health-&-population': 'badge-health',
          'physics': 'badge-physics',
          'chemistry': 'badge-chemistry',
          'biology': 'badge-biology',
          'geography': 'badge-geography',
          'economics': 'badge-economics',
          'computer': 'badge-computer',
          'computer-science': 'badge-computer'
        };
        return map[s] || 'badge-default';
      }

      function renderStarsHTML(rating) {
        var html = '';
        var full = Math.floor(rating);
        var half = rating % 1 >= 0.3;
        for (var i = 1; i <= 5; i++) {
          if (i <= full) {
            html += '<span class="star"><i class="fas fa-star"></i></span>';
          } else if (i === full + 1 && half) {
            html += '<span class="star"><i class="fas fa-star-half-alt"></i></span>';
          } else {
            html += '<span class="star empty"><i class="far fa-star"></i></span>';
          }
        }
        return html;
      }

      function renderSubjectTabs() {
        var tabsEl = document.getElementById('subject-tabs');
        var allCount = classBooks.length;
        var html = '<button class="subject-tab active" data-subject="all">All <span class="tab-count">' + allCount + '</span></button>';
        uniqueSubjects.forEach(function (s) {
          html += '<button class="subject-tab" data-subject="' + s + '">' + s + ' <span class="tab-count">' + subjectCountMap[s] + '</span></button>';
        });
        tabsEl.innerHTML = html;
      }

      function getFilteredBooks() {
        if (currentSubject === 'all') return classBooks;
        return classBooks.filter(function (b) {
          return b.subject === currentSubject;
        });
      }

      function renderBooks() {
        var grid = document.getElementById('class-books-grid');
        var resultsBar = document.getElementById('results-bar');
        var resultsCount = document.getElementById('results-count');
        var filtered = getFilteredBooks();

        resultsBar.style.display = filtered.length > 0 ? 'flex' : 'none';
        resultsCount.innerHTML = 'Showing <strong>' + filtered.length + '</strong> book' + (filtered.length !== 1 ? 's' : '');

        if (filtered.length === 0) {
          grid.innerHTML =
            '<div class="class-empty-state">' +
              '<div class="class-empty-icon"><i class="fas fa-book-open"></i></div>' +
              '<h3>No books found</h3>' +
              '<p>There are no books available for the selected subject. Try choosing a different subject filter.</p>' +
            '</div>';
          return;
        }

        var html = '';
        filtered.forEach(function (book) {
          var imageSrc = book.coverImage || 'images/books/book_subject_generic.svg';
          var bookId = book._id || book.id;
          var subjectBadgeClass = getSubjectBadgeClass(book.subject);
          var starsHTML = renderStarsHTML(book.rating || 0);

          html +=
            '<div class="class-book-card scroll-reveal">' +
              '<div class="class-book-cover">' +
                '<span class="class-book-subject-badge ' + subjectBadgeClass + '">' + (book.subject || 'General') + '</span>' +
                '<span class="class-book-rating-overlay"><i class="fas fa-star"></i> ' + (book.rating || 0).toFixed(1) + '</span>' +
                '<img src="' + base + imageSrc + '" alt="' + (book.title || '') + '" loading="lazy">' +
              '</div>' +
              '<div class="class-book-body">' +
                '<h4 class="class-book-title" title="' + (book.title || '') + '">' + (book.title || 'Untitled') + '</h4>' +
                '<p class="class-book-author"><i class="fas fa-user"></i> ' + (book.author || 'Unknown') + '</p>' +
                '<div class="class-book-stars">' +
                  starsHTML +
                  '<span class="rating-num">' + (book.rating || 0).toFixed(1) + '</span>' +
                '</div>' +
                '<div class="class-book-actions">' +
                  (book.pdfFile
                    ? '<a href="' + base + 'library/pdf/index.html?file=' + encodeURIComponent(book.pdfFile) + '" class="class-book-btn btn-read" title="Read Online"><i class="fas fa-book-open"></i> Read</a>'
                    : '<button class="class-book-btn btn-read" style="opacity:0.5;cursor:not-allowed;" title="PDF Not Available"><i class="fas fa-book-open"></i> Read</button>') +
                  (book.pdfFile
                    ? '<a href="' + base + book.pdfFile + '" class="class-book-btn btn-download" title="Download PDF" target="_blank"><i class="fas fa-download"></i> PDF</a>'
                    : '<button class="class-book-btn btn-download" style="opacity:0.5;cursor:not-allowed;" title="PDF Not Available"><i class="fas fa-download"></i> PDF</button>') +
                  '<button class="class-book-btn btn-details" title="Book Details" onclick="openBookModal(\'' + bookId + '\')"><i class="fas fa-info-circle"></i> Details</button>' +
                '</div>' +
              '</div>' +
            '</div>';
        });

        grid.innerHTML = html;

        if (typeof initScrollReveal === 'function') {
          initScrollReveal();
        }
      }

      document.getElementById('subject-tabs').addEventListener('click', function (e) {
        var btn = e.target.closest('.subject-tab');
        if (!btn) return;
        document.querySelectorAll('.subject-tab').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentSubject = btn.getAttribute('data-subject') || 'all';
        renderBooks();
      });

      renderSubjectTabs();
      renderBooks();
    });

    function openBookModal(bookId) {
      var allBooksData = typeof allBooks !== 'undefined' ? allBooks : [];
      var base = typeof getBasePath === 'function' ? getBasePath() : '../../';
      var book = null;
      for (var i = 0; i < allBooksData.length; i++) {
        if (String(allBooksData[i]._id || allBooksData[i].id) === String(bookId)) {
          book = allBooksData[i];
          break;
        }
      }
      if (!book) return;

      var imageSrc = book.coverImage || 'images/books/book_subject_generic.svg';
      var stockLevel = book.availableCopies > 5 ? 'in-stock' : book.availableCopies > 0 ? 'low-stock' : 'out-of-stock';
      var stockLabel = book.availableCopies > 5 ? 'In Stock' : book.availableCopies > 0 ? 'Low Stock' : 'Out of Stock';
      var stars = '';
      var full = Math.floor(book.rating || 0);
      var half = (book.rating || 0) % 1 >= 0.3;
      for (var s = 1; s <= 5; s++) {
        if (s <= full) stars += '<span class="star"><i class="fas fa-star"></i></span>';
        else if (s === full + 1 && half) stars += '<span class="star"><i class="fas fa-star-half-alt"></i></span>';
        else stars += '<span class="star empty"><i class="far fa-star"></i></span>';
      }

      var body = document.getElementById('book-modal-body');
      body.innerHTML =
        '<div class="book-detail-top">' +
          '<div class="book-detail-cover">' +
            '<img src="' + base + imageSrc + '" alt="' + (book.title || '') + '" loading="lazy">' +
          '</div>' +
          '<div class="book-detail-info">' +
            '<h2>' + (book.title || 'Untitled') + '</h2>' +
            '<p class="detail-author">by <strong>' + (book.author || 'Unknown') + '</strong></p>' +
            '<div class="detail-rating">' +
              '<div class="stars">' + stars + '</div>' +
              '<span class="rating-text">' + (book.rating || 0).toFixed(1) + ' / 5</span>' +
            '</div>' +
            '<div class="detail-meta">' +
              '<span class="detail-meta-tag"><i class="fas fa-tag"></i> ' + (book.category || 'N/A') + '</span>' +
              '<span class="detail-meta-tag"><i class="fas fa-graduation-cap"></i> ' + (book.subject || 'N/A') + '</span>' +
              '<span class="detail-meta-tag"><i class="fas fa-file-alt"></i> ' + (book.pages || 0) + ' pages</span>' +
              '<span class="detail-stock ' + stockLevel + '"><i class="fas fa-database"></i> ' + (book.availableCopies || 0) + ' copies - ' + stockLabel + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="detail-description">' + (book.description || 'No description available.') + '</div>' +
        '<div class="detail-actions">' +
          (book.pdfFile
            ? '<a href="' + base + 'library/pdf/index.html?file=' + encodeURIComponent(book.pdfFile) + '" class="class-book-btn btn-read"><i class="fas fa-book-open"></i> Read Online</a>'
            : '<button class="class-book-btn btn-read" style="opacity:0.5;cursor:not-allowed;"><i class="fas fa-book-open"></i> Read Online</button>') +
          (book.pdfFile
            ? '<a href="' + base + book.pdfFile + '" class="class-book-btn btn-download" target="_blank"><i class="fas fa-download"></i> Download PDF</a>'
            : '<button class="class-book-btn btn-download" style="opacity:0.5;cursor:not-allowed;"><i class="fas fa-download"></i> Download PDF</button>') +
          '<button class="class-book-btn btn-details" onclick="closeBookModal()"><i class="fas fa-times"></i> Close</button>' +
        '</div>';

      var overlay = document.getElementById('book-modal');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeBookModal() {
      var overlay = document.getElementById('book-modal');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('click', function (e) {
      if (e.target.id === 'book-modal') {
        closeBookModal();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeBookModal();
    });
  </script>
</body>
</html>
