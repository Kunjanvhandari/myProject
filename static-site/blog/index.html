<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog & Articles - SaraswatiLibrary</title>
  <meta name="description" content="Read the latest articles, book reviews, and insights from SaraswatiLibrary. Stay updated with reading tips, new releases, and library news.">
  <meta property="og:title" content="Blog & Articles - SaraswatiLibrary">
  <meta property="og:description" content="Read articles, book reviews, and insights from SaraswatiLibrary.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SaraswatiLibrary">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../images/logo/book-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .featured-article {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg, 16px);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 48px;
    }
    .featured-article:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .featured-article-img {
      height: 100%;
      min-height: 320px;
      background: var(--img-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .featured-article-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .featured-article-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .featured-article-img-placeholder i {
      font-size: 48px;
      color: var(--accent);
      opacity: 0.4;
    }
    .featured-article-body {
      padding: 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .featured-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 50px;
      background: rgba(14, 165, 233, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      width: fit-content;
    }
    .featured-article-title {
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .featured-article-excerpt {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .featured-article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .featured-article-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .blog-article-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg, 16px);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    .blog-article-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .blog-article-img {
      width: 100%;
      height: 200px;
      background: var(--img-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .blog-article-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .blog-article-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .blog-article-img-placeholder i {
      font-size: 36px;
      color: var(--accent);
      opacity: 0.3;
    }
    .blog-category-chip {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 12px;
      border-radius: 50px;
      background: rgba(14, 165, 233, 0.9);
      color: white;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .blog-article-body {
      padding: 20px;
    }
    .blog-article-title {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .blog-article-excerpt {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-article-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }
    .blog-author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0EA5E9, #8B5CF6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .blog-author-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .blog-article-date {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: auto;
    }
    @media (max-width: 900px) {
      .featured-article { grid-template-columns: 1fr; }
      .featured-article-img { min-height: 240px; }
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="blog">
  <div id="navbar"></div>

  <!-- Hero Section -->
  <section class="hero-page">
    <div class="container" style="position: relative; z-index: 2;">
      <h1 class="hero-page-title">Blog & Articles</h1>
      <p class="hero-page-subtitle">Insights, reviews, and stories from the world of books and beyond.</p>
    </div>
  </section>

  <!-- Blog Content -->
  <section class="section">
    <div class="container">
      <!-- Featured Article -->
      <div class="featured-article scroll-reveal" id="featured-article"></div>

      <!-- Articles Grid -->
      <div class="section-title" style="margin-top: 16px;">
        <span class="section-chip chip-accent"><i class="fa fa-newspaper" style="margin-right: 4px;"></i> LATEST ARTICLES</span>
        <h2 class="section-heading">Recent Posts</h2>
        <p class="section-subheading">Stay updated with our latest articles, book reviews, and library news.</p>
      </div>
      <div class="blog-grid" id="blog-articles-grid"></div>
    </div>
  </section>

  <div id="footer"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/users.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function renderBlogPage() {
      var items = typeof articles !== 'undefined' ? articles : [];
      if (items.length === 0) return;

      var base = getBasePath();

      // Featured article (first article)
      var featured = items[0];
      var featuredDate = new Date(featured.date).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
      var featuredEl = document.getElementById('featured-article');
      if (featuredEl) {
        featuredEl.innerHTML =
          '<div class="featured-article-img">' +
            '<div class="featured-article-img-placeholder">' +
              '<i class="fa fa-newspaper"></i>' +
              '<p style="font-size: 13px; color: var(--text-tertiary); margin: 0;">Featured Image</p>' +
            '</div>' +
          '</div>' +
          '<div class="featured-article-body">' +
            '<span class="featured-badge"><i class="fa fa-star"></i> Featured</span>' +
            '<div class="featured-article-meta">' +
              '<span><i class="fa fa-calendar-alt"></i> ' + featuredDate + '</span>' +
              '<span><i class="fa fa-user"></i> ' + featured.author + '</span>' +
              '<span><i class="fa fa-tag"></i> ' + featured.category + '</span>' +
            '</div>' +
            '<h2 class="featured-article-title">' + featured.title + '</h2>' +
            '<p class="featured-article-excerpt">' + featured.excerpt + '</p>' +
            '<a href="#" class="btn btn-secondary btn-rounded" onclick="event.preventDefault();">' +
              '<i class="fa fa-arrow-right"></i> Read Full Article' +
            '</a>' +
          '</div>';
      }

      // Remaining articles grid
      var gridEl = document.getElementById('blog-articles-grid');
      if (gridEl) {
        var gridHTML = '';
        for (var i = 1; i < items.length; i++) {
          var article = items[i];
          var dateFormatted = new Date(article.date).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          var initials = article.author.split(' ').map(function(n) { return n[0]; }).join('');
          gridHTML +=
            '<div class="blog-article-card scroll-reveal">' +
              '<div class="blog-article-img">' +
                '<div class="blog-article-img-placeholder">' +
                  '<i class="fa fa-file-alt"></i>' +
                '</div>' +
                '<span class="blog-category-chip">' + article.category + '</span>' +
              '</div>' +
              '<div class="blog-article-body">' +
                '<h3 class="blog-article-title">' + article.title + '</h3>' +
                '<p class="blog-article-excerpt">' + article.excerpt + '</p>' +
                '<div class="blog-article-footer">' +
                  '<div class="blog-author-avatar">' + initials + '</div>' +
                  '<div>' +
                    '<div class="blog-author-name">' + article.author + '</div>' +
                  '</div>' +
                  '<span class="blog-article-date"><i class="fa fa-calendar-alt"></i> ' + dateFormatted + '</span>' +
                '</div>' +
                '<a href="#" class="btn btn-sm btn-accent-outlined btn-rounded" style="margin-top: 16px; width: 100%; justify-content: center;" onclick="event.preventDefault();">' +
                  '<i class="fa fa-arrow-right"></i> Read More' +
                '</a>' +
              '</div>' +
            '</div>';
        }
        gridEl.innerHTML = gridHTML;
      }
    }

    // Override the default blog rendering
    document.addEventListener('DOMContentLoaded', function() {
      renderBlogPage();
    });
  </script>
</body>
</html>
