<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SaraswatiLibrary</title>
  <meta name="description" content="Admin dashboard for managing SaraswatiLibrary — books, users, categories, and site settings.">
  <meta property="og:title" content="Admin Dashboard - SaraswatiLibrary">
  <meta property="og:description" content="Manage books, users, categories, and site settings from the SaraswatiLibrary admin dashboard.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SaraswatiLibrary">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../../images/logo/book-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">

  <style>
    body[data-page="admin"] {
      background: var(--bg-primary);
    }

    #admin-content {
      width: 100%;
      min-height: 100vh;
    }

    .admin-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 20px;
    }

    .admin-loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: admin-spin 0.8s linear infinite;
    }

    .admin-loading-text {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    @keyframes admin-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body data-page="admin">

  <div id="navbar"></div>

  <script src="../../js/data.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/users.js"></script>
  <script src="../../js/notifications.js"></script>
  <script>
    (function() {
      var user = Auth.getUser();
      if (!user || user.role !== 'admin') {
        document.body.innerHTML = '<div class="auth-page"><div class="auth-card"><div style="text-align:center;"><i class="fa fa-shield-alt" style="font-size:64px;color:#EF4444;margin-bottom:20px;display:block;"></i><h1 style="font-size:28px;margin-bottom:12px;">Access Denied</h1><p style="color:var(--text-secondary);margin-bottom:24px;">You must be logged in as Head Admin to access this page.</p><a href="../index.html" class="btn btn-primary btn-rounded"><i class="fa fa-home"></i> Go Home</a></div></div></div>';
      }
    })();
  </script>

  <div id="admin-content" style="display:none;">
    <div id="admin-dashboard-root">
      <div class="admin-loading">
        <div class="admin-loading-spinner"></div>
        <span class="admin-loading-text">Loading dashboard...</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var user = Auth.getUser();
      if (user && user.role === 'admin') {
        document.getElementById('admin-content').style.display = 'block';
      }
    })();
  </script>

  <script src="../../js/navbar.js"></script>
  <script src="../../js/admin-dashboard.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var user = Auth.getUser();
      if (user && user.role === 'admin') {
        renderNavbar('admin');
        AdminDashboard.render('admin-dashboard-root');
      }
    });
  </script>

  <div id="footer"></div>
  <div id="toast-container" class="toast-container"></div>
</body>
</html>
