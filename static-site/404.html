<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | SaraswatiLibrary</title>
  <meta name="description" content="The page you're looking for doesn't exist. Browse our library collection or return to the homepage.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="images/logo/book-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 60px 24px;
    }

    .error-content {
      position: relative;
      z-index: 2;
    }

    .error-code {
      font-size: 120px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #0EA5E9, #8B5CF6, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3s ease-in-out infinite;
    }

    .error-title {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .error-desc {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }

    .error-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Floating Book */
    .floating-book {
      position: absolute;
      font-size: 48px;
      opacity: 0.08;
      animation: float1 6s ease-in-out infinite;
    }

    .floating-book:nth-child(1) {
      top: 15%;
      left: 10%;
      animation-delay: 0s;
      animation-duration: 7s;
    }

    .floating-book:nth-child(2) {
      top: 25%;
      right: 12%;
      font-size: 36px;
      animation-delay: 1s;
      animation-duration: 5s;
    }

    .floating-book:nth-child(3) {
      bottom: 20%;
      left: 15%;
      font-size: 40px;
      animation-delay: 2s;
      animation-duration: 8s;
    }

    .floating-book:nth-child(4) {
      bottom: 30%;
      right: 8%;
      font-size: 32px;
      animation-delay: 0.5s;
      animation-duration: 6s;
    }

    .floating-book:nth-child(5) {
      top: 50%;
      left: 5%;
      font-size: 28px;
      animation-delay: 3s;
      animation-duration: 9s;
    }

    .floating-book:nth-child(6) {
      top: 10%;
      right: 25%;
      font-size: 24px;
      animation-delay: 1.5s;
      animation-duration: 7s;
    }

    /* Gradient Background Shapes */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
    }

    .bg-shape:nth-of-type(1) {
      width: 400px;
      height: 400px;
      background: #0EA5E9;
      top: -100px;
      right: -100px;
    }

    .bg-shape:nth-of-type(2) {
      width: 350px;
      height: 350px;
      background: #8B5CF6;
      bottom: -120px;
      left: -80px;
    }

    .bg-shape:nth-of-type(3) {
      width: 250px;
      height: 250px;
      background: #06B6D4;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 600px) {
      .error-code {
        font-size: 80px;
      }
      .floating-book {
        font-size: 28px !important;
      }
      .bg-shape {
        width: 200px !important;
        height: 200px !important;
      }
    }
  </style>
</head>
<body data-page="home">

  <div id="navbar"></div>

  <!-- 404 Error Page -->
  <section class="error-page">
    <!-- Background Shapes -->
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>

    <!-- Floating Book Icons -->
    <div class="floating-book"><i class="fa fa-book"></i></div>
    <div class="floating-book"><i class="fa fa-book-open"></i></div>
    <div class="floating-book"><i class="fa fa-book-reader"></i></div>
    <div class="floating-book"><i class="fa fa-bookmark"></i></div>
    <div class="floating-book"><i class="fa fa-feather-alt"></i></div>
    <div class="floating-book"><i class="fa fa-glasses"></i></div>

    <!-- Error Content -->
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let us help you find your way back.</p>
      <div class="error-buttons">
        <a href="index.html" class="btn btn-secondary btn-lg btn-rounded">
          <i class="fa fa-home"></i> Go Back Home
        </a>
        <a href="library/index.html" class="btn btn-primary btn-lg btn-rounded">
          <i class="fa fa-book"></i> Browse Library
        </a>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <div id="toast-container"></div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/users.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
